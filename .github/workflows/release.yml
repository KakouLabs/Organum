name: Release Binaries

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-C strip=debuginfo"
  SCCACHE_GHA_ENABLED: "true"

jobs:
  build:
    name: Build ${{ matrix.variant }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            variant: cpu
            cargo_features: ""
            artifact_name: organum-windows-cpu
            asset_extension: .exe
            archive_format: zip
          - os: windows-latest
            variant: cpu-gpu
            cargo_features: "--features gpu-warp"
            artifact_name: organum-windows-cpu-gpu
            asset_extension: .exe
            archive_format: zip
          - os: ubuntu-latest
            variant: cpu
            cargo_features: ""
            artifact_name: organum-linux-cpu
            asset_extension: ""
            archive_format: tar.gz
          - os: ubuntu-latest
            variant: cpu-gpu
            cargo_features: "--features gpu-warp"
            artifact_name: organum-linux-cpu-gpu
            asset_extension: ""
            archive_format: tar.gz
          - os: macos-latest
            variant: cpu
            cargo_features: ""
            artifact_name: organum-macos-cpu
            asset_extension: ""
            archive_format: tar.gz
          - os: macos-latest
            variant: cpu-gpu
            cargo_features: "--features gpu-warp"
            artifact_name: organum-macos-cpu-gpu
            asset_extension: ""
            archive_format: tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.os }}-${{ matrix.variant }}

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.5

      - name: Build organum engine and caching-tool
        run: cargo build --release --workspace ${{ matrix.cargo_features }}



      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          cp target/release/organum-resampler${{ matrix.asset_extension }} artifacts/
          cp target/release/organum-wavtool${{ matrix.asset_extension }} artifacts/
          cp target/release/caching-tool${{ matrix.asset_extension }} artifacts/
          printf "%s\n" "${{ matrix.variant }}" > artifacts/BUILD_VARIANT.txt

      - name: Archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path artifacts/* -DestinationPath ${{ matrix.artifact_name }}.zip
          New-Item -ItemType Directory -Force final-artifact
          Move-Item ${{ matrix.artifact_name }}.zip final-artifact/

      - name: Archive (Linux/macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd artifacts && tar -czvf ../${{ matrix.artifact_name }}.tar.gz ./* && cd ..
          mkdir -p final-artifact
          mv ${{ matrix.artifact_name }}.tar.gz final-artifact/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-archive
          path: final-artifact/*

  validate-assets:
    name: Validate release assets
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Validate expected archive count and names
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp all-artifacts/*/* release-assets/
          ls -1 release-assets

          expected=6
          actual=$(find release-assets -maxdepth 1 -type f | wc -l | tr -d ' ')
          if [ "$actual" -ne "$expected" ]; then
            echo "Expected $expected archives, found $actual"
            exit 1
          fi

          test -f release-assets/organum-windows-cpu.zip
          test -f release-assets/organum-windows-cpu-gpu.zip
          test -f release-assets/organum-linux-cpu.tar.gz
          test -f release-assets/organum-linux-cpu-gpu.tar.gz
          test -f release-assets/organum-macos-cpu.tar.gz
          test -f release-assets/organum-macos-cpu-gpu.tar.gz

  release:
    name: Create Release
    needs: [build, validate-assets]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Package Release
        run: |
          mkdir -p release-assets
          cp all-artifacts/*/* release-assets/

      - name: Generate release notes body
        shell: bash
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          ## Binaries

          This release provides both variants per platform:

          - `*-cpu`: default CPU build
          - `*-cpu-gpu`: build with `gpu-warp` feature enabled

          ### Assets

          - `organum-windows-cpu.zip`
          - `organum-windows-cpu-gpu.zip`
          - `organum-linux-cpu.tar.gz`
          - `organum-linux-cpu-gpu.tar.gz`
          - `organum-macos-cpu.tar.gz`
          - `organum-macos-cpu-gpu.tar.gz`
          EOF

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
